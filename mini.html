<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERFAN-MD | Premium Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0b0b0f;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Premium Background */
body::before{
content:'';
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(255,215,120,.08), transparent 60%),
radial-gradient(circle at 80% 70%, rgba(255,180,90,.08), transparent 60%);
z-index:-1;
}

/* Main Card */
.main-card{
width:95%;
max-width:460px;
background:rgba(255,255,255,0.03);
backdrop-filter: blur(25px);
border:1px solid rgba(255,255,255,0.08);
border-radius:28px;
padding:40px 28px;
box-shadow:0 30px 80px rgba(0,0,0,.6);
animation:fadeUp .6s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

/* Header */
.logo-box{
width:85px;
height:85px;
margin:auto;
margin-bottom:20px;
border-radius:50%;
background:linear-gradient(135deg,#ffcc70,#ff9a44);
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
box-shadow:0 10px 40px rgba(255,170,80,.35);
}

.title{
text-align:center;
font-size:28px;
font-weight:700;
margin-bottom:6px;
background:linear-gradient(90deg,#ffcc70,#ff9a44);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
font-size:14px;
color:#aaa;
margin-bottom:28px;
}

/* Server Box */
.server-box{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
padding:16px;
border-radius:16px;
margin-bottom:20px;
cursor:pointer;
transition:.3s;
}

.server-box:hover{
border-color:#ffb35c;
}

/* Inputs */
.label{
font-size:14px;
margin-bottom:8px;
display:block;
color:#ddd;
}

.input{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.04);
color:#fff;
font-size:15px;
margin-bottom:18px;
transition:.3s;
}

.input:focus{
outline:none;
border-color:#ffb35c;
background:rgba(255,255,255,0.07);
}

/* Button */
.btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-weight:600;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.btn-main{
background:linear-gradient(135deg,#ffcc70,#ff9a44);
color:#000;
box-shadow:0 10px 30px rgba(255,170,80,.35);
}

.btn-main:hover{
transform:translateY(-3px);
}

/* Code Box */
.code-box{
margin-top:18px;
padding:20px;
border-radius:16px;
text-align:center;
border:1px dashed rgba(255,255,255,.2);
color:#aaa;
}

.code-value{
font-size:24px;
font-weight:700;
letter-spacing:3px;
color:#ffcc70;
}

/* Copy Button */
.copy-btn{
margin-top:14px;
background:rgba(255,255,255,0.08);
color:#fff;
}

/* Footer */
.footer{
text-align:center;
margin-top:28px;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<div class="main-card">

<div class="logo-box">
<i class="fas fa-bolt"></i>
</div>

<div class="title">ERFAN-MD</div>
<div class="subtitle">Premium Pair Code Generator</div>

<div class="server-box" id="serverInfo">
<i class="fas fa-server"></i>
<span id="currentServerName"> Select Server</span>
</div>

<form id="pairForm">

<label class="label">WhatsApp Number</label>
<input id="phoneNumber" class="input" placeholder="923xxxxxxxxx" required>

<button class="btn btn-main" id="generateBtn">
Generate Pair Code
</button>

<div class="code-box" id="codeBox">
Your pairing code will appear here
</div>

<button type="button" class="btn copy-btn" id="copyBtn" style="display:none">
Copy Code
</button>

</form>

<div class="footer">
© 2026 ERFAN-MD Premium Panel
</div>

</div>

<script>
const phoneInput = document.getElementById('phoneNumber');
const generateBtn = document.getElementById('generateBtn');
const codeBox = document.getElementById('codeBox');
const copyBtn = document.getElementById('copyBtn');
const form = document.getElementById('pairForm');
const serverInfo = document.getElementById('serverInfo');
const currentServerName = document.getElementById('currentServerName');

let currentCode=null;
let selectedServer=null;

/* Load Servers */
async function loadServers(){
try{
const res=await axios.get('/api/servers');
if(res.data.servers.length){
selectedServer=res.data.servers[0].id;
currentServerName.textContent=res.data.servers[0].name;
}
}catch{
selectedServer="server1";
currentServerName.textContent="Server 1";
}
}

/* Generate Code */
async function generatePairCode(e){
e.preventDefault();

if(!selectedServer){
alert("Select Server First");
return;
}

const phone=phoneInput.value.trim();
if(!phone) return;

try{
const res=await axios.get('/api/code',{
params:{
server:selectedServer,
number:phone.replace(/\D/g,'')
}
});

if(res.data.code){
currentCode=res.data.code;
codeBox.innerHTML='<div class="code-value">'+currentCode+'</div>';
copyBtn.style.display='block';
}

}catch{
codeBox.textContent="Error generating code";
}
}

/* Copy */
copyBtn.onclick=async()=>{
if(!currentCode) return;
await navigator.clipboard.writeText(currentCode);
copyBtn.textContent="Copied!";
setTimeout(()=>copyBtn.textContent="Copy Code",1500);
}

form.addEventListener('submit',generatePairCode);
document.addEventListener('DOMContentLoaded',loadServers);
</script>

</body>
</html>
